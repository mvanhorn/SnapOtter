      tags: [Tools]
      summary: Split PDF
      description: |
        Extract pages or split into parts. In "range" mode returns a single PDF
        with the selected pages. In "every" mode splits into chunks of N pages
        and returns a ZIP archive containing the parts.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "range") - One of: range, every
                    - `range` (string, optional) - Page range in qpdf syntax, e.g. "1-5,8,10-z" (required when mode is "range")
                    - `everyN` (integer 1-500, optional) - Split into chunks of N pages (required when mode is "every")
      responses:
        "200":
          description: Split PDF or ZIP archive of parts
          content:
            application/json:
              schema:
