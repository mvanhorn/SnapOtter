  /api/v1/tools/image/edit-metadata:
    post:
      operationId: editMetadata
      tags: [Tools]
      summary: Edit metadata
      description: Edit EXIF, IPTC, GPS, and other metadata fields in an image using ExifTool.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `title` (string) - Image title
                    - `author` (string) - Author name
                    - `artist` (string) - Artist or author name
                    - `copyright` (string) - Copyright notice
                    - `imageDescription` (string) - Image description
                    - `software` (string) - Software used
                    - `dateTime` (string) - Date/time string
                    - `dateTimeOriginal` (string) - Original capture date/time
                    - `clearGps` (boolean, default false) - Remove all GPS data
                    - `fieldsToRemove` (string[]) - Specific metadata fields to remove
                    - `gpsLatitude` (number -90 to 90) - GPS latitude
                    - `gpsLongitude` (number -180 to 180) - GPS longitude
                    - `gpsAltitude` (number) - GPS altitude in meters
                    - `keywords` (string[]) - Keywords or tags
                    - `keywordsMode` (string, default "add") - One of: add, set
                    - `dateShift` (string) - Shift dates by offset, e.g. "+2:00" or "-1:30"
                    - `setAllDates` (string) - Set all date fields to this value
                    - `iptcTitle` (string) - IPTC title
                    - `iptcHeadline` (string) - IPTC headline
                    - `iptcCity` (string) - IPTC city
                    - `iptcState` (string) - IPTC state or province
                    - `iptcCountry` (string) - IPTC country
      responses:
        "200":
          description: Image with updated metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/image/edit-metadata/inspect:
    post:
      operationId: inspectMetadataExifTool
      tags: [Tools]
      summary: Inspect metadata (ExifTool)
      description: Read all metadata from an image using ExifTool. Returns all embedded EXIF, IPTC, XMP, and GPS fields.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        "200":
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Batch ----------------------------------------------------------------

  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags: [Batch]
      summary: Batch process images
      description: >
        Send multiple images through a single tool. Returns a ZIP file.
        The response includes an X-Job-Id header for progress tracking.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        "200":
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  # --- Pipelines ------------------------------------------------------------

  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
      tags: [Pipelines]
      summary: Execute a pipeline
      description: Run an image through a chain of tools. The pipeline definition is sent as a JSON string in the `pipeline` multipart field.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, pipeline]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        "200":
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureNotInstalledError"

  /api/v1/pipeline/save:
    post:
      operationId: savePipeline
      tags: [Pipelines]
      summary: Save a pipeline
      description: Persist a named pipeline definition with its tool steps for later execution. Use this to save reusable workflows.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, steps]
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        "201":
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/list:
    get:
      operationId: listPipelines
      tags: [Pipelines]
      summary: List saved pipelines
      description: Retrieve all saved pipeline definitions for the current user. Returns name, steps, and creation date for each.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the pipeline
                        steps:
                          type: array
                          items:
                            type: object
                        createdAt:
                          type: string
                          format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/{id}:
    delete:
      operationId: deletePipeline
      tags: [Pipelines]
      summary: Delete a pipeline
      description: Permanently delete a saved pipeline by its ID. Only the pipeline owner or an admin can delete it.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Pipeline UUID
          schema:
            type: string
      responses:
        "200":
          description: Pipeline deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "403":
          description: Not authorized to delete this pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Pipeline not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/tools:
    get:
      operationId: listPipelineTools
      tags: [Pipelines]
      summary: List pipeline-compatible tools
      description: Returns all tool IDs that can be used as pipeline steps.
      security: []
      responses:
        "200":
          description: Tool IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolIds:
                    type: array
                    items:
                      type: string

  /api/v1/pipeline/batch:
    post:
      operationId: batchPipeline
      tags: [Pipelines]
      summary: Run pipeline on multiple files
      description: Execute a pipeline across multiple images. Returns a ZIP file with all processed results.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, pipeline]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process
                pipeline:
                  type: string
                  description: |
                    JSON string with pipeline definition:
                    - `steps` (array, required, 1-20 items) - Pipeline steps
                    - `steps[].toolId` (string, required) - Tool ID for this step
                    - `steps[].settings` (object, optional) - Tool-specific settings
                clientJobId:
                  type: string
                  description: Optional client-provided job ID for progress tracking via SSE
      responses:
        "200":
          description: ZIP file with processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job ID for progress tracking
            X-File-Results:
              schema:
                type: string
              description: Percent-encoded JSON mapping of input index to output filename (decode with decodeURIComponent before JSON.parse)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  # --- Files ----------------------------------------------------------------

  /api/v1/upload:
    post:
      operationId: uploadImage
      tags: [Files]
      summary: Upload an image
      description: Upload a raw image file for later processing by tool endpoints. Returns a jobId and file metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        format:
                          type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/download/{jobId}/{filename}:
    get:
      operationId: downloadProcessedImage
      tags: [Files]
      summary: Download a processed image
      description: Download a processed image by its job ID and filename. This is the URL returned in downloadUrl from tool responses.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier from a tool processing response
          schema:
            type: string
        - name: filename
          in: path
          required: true
          description: Output filename from the processing response
          schema:
            type: string
      responses:
        "200":
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/preview:
    post:
      operationId: generatePreview
      tags: [Files]
      summary: Generate image preview
      description: Convert any image (including HEIC/HEIF) to a WebP preview, resized to fit within 1200x1200 pixels.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
      responses:
        "200":
          description: WebP preview image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files:
    get:
      operationId: listFiles
      tags: [Files]
      summary: List saved files
      description: Returns the latest version of each file (one per version chain). Supports pagination and search.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        "200":
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
    delete:
      operationId: bulkDeleteFiles
      tags: [Files]
      summary: Bulk delete saved files
      description: Delete files and their entire version chains. Non-admin users can only delete their own files.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/files/upload:
    post:
      operationId: saveFileToLibrary
      tags: [Files]
      summary: Save file to library
      description: Upload one or more image files directly to the file library for persistent storage and version tracking.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      description: Full file object with all metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/files/save-result:
    post:
      operationId: saveProcessingResult
      tags: [Files]
      summary: Save a processing result to library
      description: Save a tool processing result as a new version of an existing file. Creates a version chain.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, parentId]
              properties:
                file:
                  type: string
                  format: binary
                  description: The processed image file
                parentId:
                  type: string
                  description: ID of the parent file in the version chain
                toolId:
                  type: string
                  description: Tool that produced this result
      responses:
        "201":
          description: File saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    description: Full file object with all metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Parent file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}:
    get:
      operationId: getFile
      tags: [Files]
      summary: Get file metadata and version history
      description: Retrieve metadata and the full version history for a saved file. Use this to inspect file details before downloading.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type: [string, "null"]
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}/download:
    get:
      operationId: downloadSavedFile
      tags: [Files]
      summary: Download a saved file
      description: Download the binary content of a saved file from the library by its ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}/thumbnail:
    get:
      operationId: getFileThumbnail
      tags: [Files]
      summary: Get file thumbnail
      description: Retrieve a 300px JPEG thumbnail of a saved file. Useful for gallery views and file browsers.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: 300px JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Thumbnail generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"


  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags: [Files]
      summary: Fetch images from URLs
      description: |
        Fetch one or more images from external URLs. Each URL is validated against SSRF
        attacks, size-limited, and verified as a valid image. Returns download URLs for
        each successfully fetched image. Rate limited to 200 requests per hour.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        "200":
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type: [string, "null"]
                        error:
                          type: string
                          description: Present only when success is false
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/config/locale:
    get:
      operationId: getLocaleConfig
      tags: [System]
      summary: Get default locale
      description: Returns the default locale setting. Public endpoint.
      security: []
      responses:
        "200":
          description: Default locale
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultLocale:
                    type: string
                    example: en

  # --- Auth -----------------------------------------------------------------

  /api/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in
      description: Authenticate with username and password. Returns a bearer token for subsequent API requests.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      role:
                        type: string
                      mustChangePassword:
                        type: boolean
                      permissions:
                        type: array
                        items:
                          type: string
                      teamName:
                        type: string
                  expiresAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Log out
      description: Invalidate the current session token. The token cannot be used for further requests after logout.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/auth/session:
    get:
      operationId: getSession
      tags: [Auth]
      summary: Get current session
      description: Retrieve the current session details including user profile, role, and permissions. Returns null user when not authenticated.
      security: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      role:
                        type: string
                      mustChangePassword:
                        type: boolean
                      permissions:
                        type: array
                        items:
                          type: string
                  expiresAt:
                    type: [string, "null"]
                    format: date-time

  /api/auth/change-password:
    post:
      operationId: changePassword
      tags: [Auth]
      summary: Change password
      description: Change the authenticated user's password. Requires the current password for verification.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/auth/users:
    get:
      operationId: listUsers
      tags: [Auth]
      summary: List users
      description: Requires users:manage permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        role:
                          type: string
                        team:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  maxUsers:
                    type: integer
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  /api/auth/register:
    post:
      operationId: createUser
      tags: [Auth]
      summary: Create user
      description: Requires users:manage permission.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                role:
                  type: string
                  description: Built-in role (admin, editor, user) or custom role name
                  default: user
                team:
                  type: string
                  default: Default
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  role:
                    type: string
                  team:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/auth/users/{id}:
    put:
      operationId: updateUser
      tags: [Auth]
      summary: Update user
      description: Requires users:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  description: Built-in role (admin, editor, user) or custom role name
                team:
                  type: string
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
    delete:
      operationId: deleteUser
      tags: [Auth]
      summary: Delete user
      description: Requires users:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User UUID
          schema:
            type: string
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  /api/auth/users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [Auth]
      summary: Reset user password
      description: Requires users:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # --- API Keys -------------------------------------------------------------

  /api/v1/api-keys:
    post:
      operationId: createApiKey
      tags: [API Keys]
      summary: Create an API key
      description: >
        Generate a new API key. The full key (prefixed with si_) is returned
        only once. Keys are stored using scrypt hashing.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
                  default: Default API Key
                permissions:
                  type: array
                  items:
                    type: string
                  description: Scoped permissions for this key
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration date
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  key:
                    type: string
                    description: Full key (only shown once)
                  name:
                    type: string
                  permissions:
                    type: [array, "null"]
                    items:
                      type: string
                  expiresAt:
                    type: [string, "null"]
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
    get:
      operationId: listApiKeys
      tags: [API Keys]
      summary: List API keys
      description: Returns key metadata but not the full key.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        permissions:
                          type: [array, "null"]
                          items:
                            type: string
                        createdAt:
                          type: string
                          format: date-time
                        lastUsedAt:
                          type: [string, "null"]
                          format: date-time
                        expiresAt:
                          type: [string, "null"]
                          format: date-time
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/api-keys/{id}:
    delete:
      operationId: deleteApiKey
      tags: [API Keys]
      summary: Delete an API key
      description: Permanently revoke and delete an API key. The key cannot be used for authentication after deletion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: API key UUID
          schema:
            type: string
      responses:
        "200":
          description: API key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Authentication required
          content:
