        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

