  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags: [Tools]
      summary: Compress PDF
      description: |
        Shrink PDF file size by downsampling embedded images. In "quality" mode
        a 1-100 slider controls image DPI. In "targetSize" mode a binary search
        finds the highest DPI that fits the target. If compression would enlarge
        the file, the original bytes are returned unchanged.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        "200":
          description: Compressed PDF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

