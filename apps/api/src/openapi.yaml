  # --- System (additional) --------------------------------------------------

  /api/v1/config/auth:
    get:
      operationId: getAuthConfig
      tags: [System]
      summary: Auth configuration
      description: Check whether authentication is enabled on this instance. Public endpoint used by the frontend to determine login flow.
      security: []
      responses:
        "200":
          description: Auth config
          content:
            application/json:
              schema:
                type: object
                properties:
                  authEnabled:
                    type: boolean

  /api/v1/jobs/{jobId}/progress:
    get:
      operationId: getJobProgress
      tags: [System]
      summary: Job progress (SSE)
      description: >
        Server-Sent Events stream for tracking long-running jobs. Closes
        automatically 5 seconds after completion.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job UUID from a tool processing or installation response
          schema:
            type: string
      responses:
        "200":
          description: >
            SSE stream of job progress events. Two event types: `single` (single-file tools)
            and `batch` (batch processing). Single events have `status` and `progress`.
            Batch events have `completedFiles`, `totalFiles`, `failedFiles` (integers),
            and an `errors` array.
          content:
            text/event-stream:
              schema:
                type: object
                description: >
                  Event shape varies by type. Single: { status, progress }.
                  Batch: { completedFiles, totalFiles, failedFiles, errors }.
                properties:
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  completedFiles:
                    type: integer
                    description: Number of completed files (batch mode)
                  totalFiles:
                    type: integer
                    description: Total files to process (batch mode)
                  failedFiles:
                    type: integer
                    description: Number of failed files (batch mode)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        error:
                          type: string
                    description: Error details for failed files (batch mode)

  # --- Admin ---------------------------------------------------------------

  /api/v1/admin/health:
    get:
      operationId: adminHealthCheck
      tags: [Admin]
      summary: Admin health check
      description: |
        Full system diagnostics including database status, storage mode, queue
        state, and GPU availability. Requires the system:health permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detailed system health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminHealthResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # --- Analytics -----------------------------------------------------------

  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags: [Analytics]
      summary: Get analytics configuration
      description: |
        Returns the effective analytics provider configuration. Analytics is
        enabled only when both the compile-time bake and the instance
        analyticsEnabled setting allow it. When disabled, the keys, DSN, and
        instanceId are blank. Public endpoint.
      security: []
      responses:
        "200":
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sampleRate:
                    type: number
                  instanceId:
                    type: string

  # --- Features ------------------------------------------------------------

  /api/v1/features:
    get:
      operationId: listFeatures
      tags: [Features]
      summary: List feature bundles
      description: |
        Returns all available AI feature bundles and their installation status.
        In non-Docker environments, all bundles show as installed.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum: [installed, not_installed, installing, queued, error]
                        installedVersion:
                          type: [string, "null"]
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type: [integer, "null"]
                          description: >-
                            Compressed archive size for this host's
                            architecture, when the manifest records it. Null in
                            native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type: [integer, "null"]
                          description: >-
                            Extracted on-disk size for this host's
                            architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type: [object, "null"]
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type: [string, "null"]
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags: [Features]
      summary: Install a feature bundle
      description: |
        Start async installation of an AI feature bundle. Downloads models and
        configures the Python sidecar. Returns a jobId for progress tracking
        via the SSE endpoint. Requires features:manage permission.

        Installs are serialized server-side: a request made while another
        install is running is queued (queued=true) rather than rejected, and
        starts automatically when the running install finishes. A repeat
        request for the same in-flight bundle is deduped and returns the same
        jobId.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        "202":
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: >-
                      True when the install was queued behind another running
                      install instead of starting immediately.
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags: [Features]
      summary: Uninstall a feature bundle
      description: |
        Uninstall an AI feature bundle and delete its model files (unless shared
        with another installed bundle). Requires features:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        "200":
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/admin/features/disk-usage:
    get:
      operationId: getFeatureDiskUsage
      tags: [Features]
      summary: AI model disk usage
      description: |
        Returns the total disk space used by AI model files.
        Requires features:manage permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Disk usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBytes:
                    type: integer
                    description: Total bytes used by AI model files
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # --- Audit Log -----------------------------------------------------------

  /api/v1/audit-log:
    get:
      operationId: queryAuditLog
      tags: [Audit]
      summary: Query audit log
      description: |
        Paginated audit log of administrative actions. Supports filtering by
        action type and date range. Requires audit:read permission.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (1-100, default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: from
          in: query
          description: Filter entries after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter entries before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        actorId:
                          type: [string, "null"]
                        actorUsername:
                          type: string
                        action:
                          type: string
                        targetType:
                          type: [string, "null"]
                        targetId:
                          type: [string, "null"]
                        details:
                          type: [object, "null"]
                        ipAddress:
                          type: [string, "null"]
                        requestId:
                          type: [string, "null"]
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total matching entries
                  page:
                    type: integer
                  limit:
                    type: integer
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # --- Roles ---------------------------------------------------------------

  /api/v1/roles:
    get:
      operationId: listRoles
      tags: [Roles]
      summary: List roles
      description: |
        List all roles (built-in and custom) with their permissions and user
        counts. Requires audit:read permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the role
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
    post:
      operationId: createRole
      tags: [Roles]
      summary: Create a custom role
      description: |
        Create a new custom role with specified permissions. Role names must be
        2-30 characters, lowercase alphanumeric with hyphens and underscores.
        Requires security:manage permission.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: "^[a-z0-9_-]+$"
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    features:manage, system:health, audit:read, security:manage
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the role
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "409":
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/roles/{id}:
    put:
      operationId: updateRole
      tags: [Roles]
      summary: Update a custom role
      description: |
        Update name, description, or permissions of a custom role. Built-in
        roles cannot be modified. Requires security:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                description:
                  type: string
                  description: Updated description for the role
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Validation error or cannot modify built-in role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"
    delete:
      operationId: deleteRole
      tags: [Roles]
      summary: Delete a custom role
      description: |
        Delete a custom role. Users assigned to this role are reassigned to the
        default "user" role. Built-in roles cannot be deleted. Requires
        security:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Cannot delete built-in role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/tools/video/convert-video:
    post:
      operationId: convertVideo
      tags: [Tools]
      summary: Convert Video
      description: Convert videos between MP4, MOV, WebM, AVI, and MKV.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `format` (string, default "mp4") - One of: mp4, mov, webm, avi, mkv
                    - `quality` (string, default "balanced") - One of: high, balanced, small
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
