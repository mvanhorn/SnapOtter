      operationId: analyzePassportPhoto
      tags: [Tools]
      summary: Passport photo - analyze
      description: |
        Phase 1 of passport photo generation. Detects face landmarks and removes
        the background. Returns landmark data and a base64-encoded preview for
        the client to use in the generate phase. Requires the passport-photo
        feature bundle to be installed.
      security:
